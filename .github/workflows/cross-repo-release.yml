name: Cross-Repo Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整克隆，确保git rev-list能正确获取提交次数
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
            
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Debug secrets availability
        run: |
          echo "Checking secrets availability..."
          if [[ -n "${{ secrets.KEYSTORE_FILE }}" ]]; then
            echo "✅ KEYSTORE_FILE is available"
          else
            echo "❌ KEYSTORE_FILE is not available"
          fi
          
          if [[ -n "${{ secrets.KEYSTORE_PASSWORD }}" ]]; then
            echo "✅ KEYSTORE_PASSWORD is available"
          else
            echo "❌ KEYSTORE_PASSWORD is not available"
          fi
          
          if [[ -n "${{ secrets.KEY_ALIAS }}" ]]; then
            echo "✅ KEY_ALIAS is available"
          else
            echo "❌ KEY_ALIAS is not available"
          fi
          
          if [[ -n "${{ secrets.KEY_PASSWORD }}" ]]; then
            echo "✅ KEY_PASSWORD is available"
          else
            echo "❌ KEY_PASSWORD is not available"
          fi
          
          if [[ -n "${{ secrets.PUBLISH_REPO_TOKEN }}" ]]; then
            echo "✅ PUBLISH_REPO_TOKEN is available"
          else
            echo "❌ PUBLISH_REPO_TOKEN is not available"
          fi
        
      - name: Decode and setup keystore
        run: |
          if [[ -z "${{ secrets.KEYSTORE_FILE }}" ]]; then
            echo "❌ KEYSTORE_FILE is not set or empty"
            exit 1
          fi
          if [[ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]]; then
            echo "❌ KEYSTORE_PASSWORD is not set or empty"
            exit 1
          fi
          if [[ -z "${{ secrets.KEY_ALIAS }}" ]]; then
            echo "❌ KEY_ALIAS is not set or empty"
            exit 1
          fi
          if [[ -z "${{ secrets.KEY_PASSWORD }}" ]]; then
            echo "❌ KEY_PASSWORD is not set or empty"
            exit 1
          fi
          echo "✅ All signing secrets are configured"
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > plwd_cn.keystore
          echo "✅ Keystore file decoded successfully"
          
      - name: Generate Version Changelog
        id: changelog
        run: |
          echo "🔍 生成版本更新日志..."

          # 获取当前标签
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          echo "当前标签: $CURRENT_TAG"

          # 获取所有标签并排序
          ALL_TAGS=$(git tag --sort=-version:refname)
          echo "所有标签列表:"
          echo "$ALL_TAGS"

          # 找到当前标签在列表中的位置
          TAG_ARRAY=($ALL_TAGS)
          CURRENT_INDEX=-1

          for i in "${!TAG_ARRAY[@]}"; do
            if [ "${TAG_ARRAY[$i]}" = "$CURRENT_TAG" ]; then
              CURRENT_INDEX=$i
              break
            fi
          done

          echo "当前标签索引: $CURRENT_INDEX"

          # 获取上一个标签
          if [ $CURRENT_INDEX -gt 0 ]; then
            PREVIOUS_TAG="${TAG_ARRAY[$((CURRENT_INDEX + 1))]}"
            echo "上一个标签: $PREVIOUS_TAG"

            # 生成版本日志
            echo "生成标签间差异日志..."
            CHANGELOG=$(git log --oneline --pretty=format:"- %s" "${PREVIOUS_TAG}..${CURRENT_TAG}" | head -10)

            if [ -n "$CHANGELOG" ]; then
              echo "变更日志内容:"
              echo "$CHANGELOG"
            else
              echo "未找到变更内容，使用默认日志"
              CHANGELOG="- 版本更新和优化"
            fi
          else
            echo "未找到上一个标签，使用最近5个提交"
            CHANGELOG=$(git log --oneline -5 --pretty=format:"- %s")
          fi

          # 设置输出变量（GitHub Actions格式）
          {
            echo "changelog<<EOF"
            echo "## 📱 版本更新内容 ($CURRENT_TAG)"
            echo ""
            echo "**构建信息：**"
            echo "- 版本号: $CURRENT_TAG"
            echo "- 构建号: $(git rev-list --count HEAD)"
            echo "- 提交哈希: $(git rev-parse --short HEAD)"
            echo ""
            echo "**更新内容：**"
            echo "$CHANGELOG"
            echo ""
            echo "_完整更新日志请查看Git提交历史_"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "✅ 版本日志生成完成"

      - name: Build APK
        run: |
          echo "🔍 构建环境信息："
          echo "GitHub Run Number: $GITHUB_RUN_NUMBER"
          echo "GitHub SHA: $GITHUB_SHA"
          echo "GitHub Ref: $GITHUB_REF"
          echo "当前目录: $(pwd)"
          echo "Git提交次数: $(git rev-list --count HEAD)"
          echo "Git当前提交: $(git rev-parse --short HEAD)"

          # 设置正确的构建号环境变量，确保与更新日志一致
          echo "设置构建号环境变量..."
          export BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER: $BUILD_NUMBER"

          echo "清理构建缓存..."
          ./gradlew clean

          echo "开始构建Release APK..."
          ./gradlew assembleRelease
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          BUILD_NUMBER: $(git rev-list --count HEAD)
        
      - name: Debug build output
        run: |
          echo "📁 Build output structure:"
          echo "=== Root build directory ==="
          ls -la ./app/build/ 2>/dev/null || echo "No build directory"
          
          echo "=== Outputs directory ==="
          ls -la ./app/build/outputs/ 2>/dev/null || echo "No outputs directory"
          
          echo "=== APK directory ==="
          ls -la ./app/build/outputs/apk/ 2>/dev/null || echo "No apk directory"
          
          echo "=== Release directory ==="
          ls -la ./app/build/outputs/apk/release/ 2>/dev/null || echo "No release directory"
          
          echo "=== All APK files ==="
          find ./app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        
      - name: Find and verify APK
        id: find_apk
        run: |
          echo "🔍 Searching for APK files..."
          
          # 查找所有可能的APK路径
          APK_PATHS=(
            "./app/build/outputs/apk/release/app-release.apk"
            "./app/build/outputs/apk/release/app-release-unsigned.apk"
            "./app/build/outputs/apk/release/app-release-signed.apk"
            "./app/build/outputs/apk/release/app-release-universal.apk"
          )
          
          FOUND_APK=""
          for path in "${APK_PATHS[@]}"; do
            if [ -f "$path" ]; then
              FOUND_APK="$path"
              echo "✅ Found APK at: $path"
              break
            fi
          done
          
          if [ -z "$FOUND_APK" ]; then
            echo "❌ No APK found in expected locations"
            echo "🔍 Searching for any APK files in build output..."
            find ./app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
            
            echo "📁 Build output structure:"
            ls -la ./app/build/outputs/ 2>/dev/null || echo "No outputs directory"
            ls -la ./app/build/outputs/apk/ 2>/dev/null || echo "No apk directory"
            ls -la ./app/build/outputs/apk/release/ 2>/dev/null || echo "No release directory"
            
            exit 1
          fi
          
          # 获取APK信息
          APK_SIZE=$(stat -c%s "$FOUND_APK")
          APK_NAME=$(basename "$FOUND_APK")
          
          echo "📦 APK Details:"
          echo "  - Path: $FOUND_APK"
          echo "  - Name: $APK_NAME"
          echo "  - Size: $APK_SIZE bytes ($(($APK_SIZE / 1024 / 1024)) MB)"
          
          # 检查APK大小限制
          if [ $APK_SIZE -gt 104857600 ]; then
            echo "❌ APK size exceeds GitHub's 100MB limit!"
            exit 1
          fi
          
          echo "✅ APK size is within limits"
          
          # 输出到GitHub Actions环境变量
          echo "apk_path=$FOUND_APK" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Create Release in Publish Repository (cross-repo)
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_REPO_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          RELEASE_NAME="Release $TAG"

          # 使用动态生成的changelog
          BODY="${{ steps.changelog.outputs.changelog }}

          ---

          ### 📋 发布信息
          - **版本号**: $TAG
          - **构建提交**: ${{ github.sha }}
          - **源仓库**: ${{ github.repository }}
          - **构建时间**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')

          ### 📥 下载
          点击下方文件下载最新版本APK

          ### 📱 安装说明
          1. 下载APK文件
          2. 允许安装未知来源应用
          3. 安装新版本"

          echo "📄 发布说明内容："
          echo "$BODY"

          # 检查 Release 是否已存在
          if gh release view "$TAG" --repo plwd2022/myk-fuxi-Publish; then
            echo "Release for $TAG already exists in target repo. Skipping."
            exit 0
          fi

          # 创建发布
          gh release create "$TAG" \
            --repo plwd2022/myk-fuxi-Publish \
            --title "$RELEASE_NAME" \
            --notes "$BODY"

      - name: Upload Release APK to Publish Repository
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_REPO_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" "${{ steps.find_apk.outputs.apk_path }}" --repo plwd2022/myk-fuxi-Publish --clobber
          
      - name: Verify cross-repo release
        run: |
          echo "✅ Cross-repo release created successfully"
          echo "Release URL: https://github.com/plwd2022/myk-fuxi-Publish/releases/tag/${{ github.ref_name }}"
          echo "Published to: plwd2022/myk-fuxi-Publish"